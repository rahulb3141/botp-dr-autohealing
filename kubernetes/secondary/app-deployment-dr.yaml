apiVersion: apps/v1
kind: Deployment
metadata:
  name: sample-app-dr
  namespace: default
  labels:
    app: sample-app-dr
    environment: dr
spec:
  replicas: 1  # Pilot light - minimal replicas
  selector:
    matchLabels:
      app: sample-app-dr
  template:
    metadata:
      labels:
        app: sample-app-dr
        environment: dr
    spec:
      containers:
      - name: nginx
        image: nginx:1.21
        ports:
        - containerPort: 80
          name: http
        
        # Environment variables to distinguish DR
        env:
        - name: REGION
          value: "us-east-1"
        - name: ENVIRONMENT
          value: "dr"
        - name: AZ_PREFERENCE
          value: "us-east-1b,us-east-1c"  # Different AZs
        
        # Custom nginx config for DR
        volumeMounts:
        - name: nginx-config
          mountPath: /etc/nginx/conf.d
        - name: dr-content
          mountPath: /usr/share/nginx/html
      
      volumes:
      - name: nginx-config
        configMap:
          name: nginx-config-dr
      - name: dr-content
        configMap:
          name: dr-content
      
      # Force scheduling to different AZs
      affinity:
        nodeAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            preference:
              matchExpressions:
              - key: topology.kubernetes.io/zone
                operator: In
                values: ["us-east-1b", "us-east-1c"]

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config-dr
  namespace: default
data:
  default.conf: |
    server {
        listen 80;
        server_name localhost;
        
        location / {
            root /usr/share/nginx/html;
            index index.html index.htm;
        }
        
        location /health {
            access_log off;
            return 200 "healthy-dr-$(hostname)\n";
            add_header Content-Type text/plain;
        }
        
        location /status {
            access_log off;
            return 200 "DR Environment - AZ: us-east-1b/1c\n";
            add_header Content-Type text/plain;
        }
    }

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dr-content
  namespace: default
data:
  index.html: |
    <!DOCTYPE html>
    <html>
    <head>
        <title>DR Environment</title>
        <style>
            body { font-family: Arial; text-align: center; background: #f0f8ff; }
            .dr-banner { background: #ff6b6b; color: white; padding: 20px; }
        </style>
    </head>
    <body>
        <div class="dr-banner">
            <h1>🚨 DISASTER RECOVERY ENVIRONMENT 🚨</h1>
            <p>This is the DR instance running in different AZs</p>
            <p>Region: us-east-1 | AZs: us-east-1b, us-east-1c</p>
        </div>
    </body>
    </html>
